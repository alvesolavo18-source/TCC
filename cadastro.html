<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4faff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.formulario{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:350px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#4da6ff;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1e90ff;
}

.voltar-btn{
    display:block;
    width:94%;
    text-align:center;

    margin-top:10px;
    padding:10px;

    background:#e0e0e0;
    color:black;

    text-decoration:none;
    border-radius:8px;
}

.voltar-btn:hover{
    background:#cfcfcf;
}
</style>
</head>

<body>

<div class="formulario">

    <h2>Cadastre-se</h2>

    <form>
        <input type="text" placeholder="Nome Completo" required>

        <input type="email" placeholder="E-mail" required>

        <input type="password" placeholder="Senha" required>

        <button type="submit">
            Cadastrar
        </button>
        <a href="trabalho.html" class="voltar-btn">
            Voltar ao Início
        </a>
    </form>

</div>

</body>
</html>
